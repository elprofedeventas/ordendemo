<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ORDEN PPP</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0efe9;--panel:#fff;--negro:#18181b;--texto:#27272a;--muted:#71717a;
  --borde:#e4e4e7;--azul:#2563eb;--verde:#16a34a;--rojo:#dc2626;--am:#d97706;
  --morado:#7c3aed;--tab:64px;--top:52px;--ban:30px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--texto);font-size:14px;-webkit-font-smoothing:antialiased}

.banner{position:fixed;top:0;left:0;right:0;height:var(--ban);background:var(--negro);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.4);z-index:100}
.banner span{color:#facc15}

.topbar{position:fixed;top:var(--ban);left:0;right:0;height:var(--top);background:var(--panel);border-bottom:1px solid var(--borde);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:90}
.tlogo{font-size:17px;font-weight:800;color:var(--negro);letter-spacing:.04em;flex:1}
.ibtn{width:36px;height:36px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;border:none;position:relative}
.ndot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--rojo);border-radius:50%;border:1.5px solid var(--panel)}
.tavatar{width:36px;height:36px;background:var(--negro);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}

.sa{position:fixed;top:calc(var(--ban) + var(--top));bottom:var(--tab);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 8px}

.tabs{position:fixed;bottom:0;left:0;right:0;height:var(--tab);background:var(--panel);border-top:1px solid var(--borde);display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;padding-top:6px}
.ticon{font-size:19px;line-height:1;transition:transform .2s}
.tlbl{font-size:10px;font-weight:600;color:var(--muted)}
.tab.activo .tlbl{color:var(--negro)}
.tab.activo .ticon{transform:translateY(-2px)}
.tline{position:absolute;top:0;width:28px;height:2.5px;background:var(--negro);border-radius:0 0 3px 3px;transition:left .3s cubic-bezier(.34,1.56,.64,1)}

/* COMPONENTES COMUNES */
.card{background:var(--panel);border-radius:14px;border:1px solid var(--borde);overflow:hidden;margin-bottom:10px}
.card-h{padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--borde)}
.card-t{font-size:13px;font-weight:700;color:var(--negro)}
.card-m{font-size:11px;color:var(--muted)}
.card-b{padding:14px 16px}

.sl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between}
.sl:first-child{margin-top:0}
.sv{font-size:11px;color:var(--azul);font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0}

.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:var(--rojo);color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:0 5px;font-family:'JetBrains Mono',monospace}
.badge-v{background:var(--verde)}
.badge-a{background:var(--am)}

/* KPI GRID */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:4px}
.kgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:4px}
.kpi{background:var(--panel);border-radius:14px;border:1px solid var(--borde);padding:14px 14px 12px;position:relative;overflow:hidden}
.kpi-n{font-size:28px;font-weight:800;color:var(--negro);line-height:1;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.kpi-l{font-size:11px;color:var(--muted);font-weight:500;line-height:1.3}
.kpi-s{position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.kpi-small .kpi-n{font-size:20px}

/* TENDENCIA */
.trend-up{color:var(--verde);font-size:11px;font-weight:700}
.trend-dn{color:var(--rojo);font-size:11px;font-weight:700}
.trend-eq{color:var(--muted);font-size:11px;font-weight:700}

/* ROWS */
.prow{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--borde);cursor:pointer}
.prow:last-child{border-bottom:none}
.prow:active{background:var(--bg)}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pn{font-size:13px;font-weight:700;color:var(--negro);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pright{text-align:right;flex-shrink:0}
.pf{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.pv{font-size:11px;color:var(--verde);font-weight:600;margin-top:2px}

/* BARRAS */
.btrack{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.bfill{height:100%;border-radius:3px;transition:width 1s ease}

/* TABLA */
.tabla{width:100%;border-collapse:collapse;font-size:12px}
.tabla th{text-align:left;padding:8px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--borde);font-weight:600;white-space:nowrap}
.tabla td{padding:10px 10px;border-bottom:1px solid var(--borde);color:var(--texto)}
.tabla tr:last-child td{border-bottom:none}
.tabla tr:active td{background:var(--bg)}

/* CHART MINI */
.bars{display:flex;align-items:flex-end;gap:4px;height:60px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height 1s ease;min-height:2px}
.bar-lbl{font-size:9px;color:var(--muted);font-weight:600;white-space:nowrap}

/* ALERT STRIP */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;margin-bottom:8px;font-size:12px;line-height:1.4}
.alert-r{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-a{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-v{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.alert-b{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.alert-ico{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-txt strong{display:block;font-weight:700;margin-bottom:1px}

/* PIPELINE FILTROS */
.esc{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.esc::-webkit-scrollbar{display:none}
.echip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;border:1.5px solid var(--borde);background:var(--panel);color:var(--muted)}
.echip.activo{background:var(--negro);color:#fff;border-color:var(--negro)}
.ecdot{width:6px;height:6px;border-radius:50%}

/* PROSPECT CARD */
.pcf{background:var(--panel);border-radius:14px;border:1px solid var(--borde);padding:15px;margin-bottom:9px;cursor:pointer;overflow:hidden}
.pcf:active{transform:scale(.99)}
.pcf-stripe{height:3px;margin:-15px -15px 13px;border-radius:0}
.pcf-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.pcf-n{font-size:14px;font-weight:800;color:var(--negro);line-height:1.2}
.pcf-c{font-size:12px;color:var(--muted);margin-top:2px}
.pcf-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--verde);font-weight:600;white-space:nowrap}
.pcf-foot{display:flex;align-items:center;gap:7px}
.pcf-vt{font-size:11px;color:var(--muted);background:var(--bg);padding:3px 7px;border-radius:6px;font-weight:600}
.pcf-fecha{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;margin-left:auto}

/* EQUIPO */
.ecard{background:var(--panel);border-radius:14px;border:1px solid var(--borde);overflow:hidden;margin-bottom:10px;cursor:pointer}
.etop{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--borde)}
.eav{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.en{font-size:14px;font-weight:800;color:var(--negro)}
.ec{font-size:12px;color:var(--muted);margin-top:1px}
.ealerta{margin-left:auto;background:#fef2f2;color:var(--rojo);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.enums{display:grid;grid-template-columns:1fr 1fr 1fr 1fr}
.enum{text-align:center;padding:11px 4px;border-right:1px solid var(--borde)}
.enum:last-child{border-right:none}
.enumv{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--negro)}
.enuml{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* PISTAS */
.pista{background:var(--panel);border-radius:14px;border:1px solid var(--borde);padding:16px;margin-bottom:9px}

/* BOTTOM SHEET */
.sbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.sbg.open{display:flex;animation:fadeIn .2s ease}
.sheet{background:var(--panel);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;overflow-x:hidden;animation:slideUp .3s cubic-bezier(.34,1.2,.64,1);padding-bottom:calc(env(safe-area-inset-bottom) + 8px)}
.shandle{width:40px;height:4px;background:var(--borde);border-radius:2px;margin:12px auto 0}
.shd{padding:15px 20px 13px;border-bottom:1px solid var(--borde)}
.shn{font-size:19px;font-weight:800;color:var(--negro);line-height:1.2}
.shc{font-size:13px;color:var(--muted);margin-top:3px}
.setb{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;margin-top:9px}
.sbd{padding:15px 20px}
.ichips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.ic{background:var(--bg);border-radius:10px;padding:11px 13px}
.icl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.icv{font-size:14px;font-weight:700;color:var(--negro)}
.icf{grid-column:1/-1}
.icf .icv{font-size:13px;font-weight:500;line-height:1.4}
.ht{font-size:11px;font-weight:700;color:var(--negro);text-transform:uppercase;letter-spacing:.1em;margin-bottom:13px}
.hi{display:flex;gap:11px;padding-bottom:15px;position:relative}
.hi:not(:last-child)::before{content:'';position:absolute;left:18px;top:37px;width:1px;height:calc(100% - 15px);background:var(--borde)}
.hico{width:36px;height:36px;background:var(--bg);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;position:relative;z-index:1}
.hcon{flex:1;padding-top:2px}
.ha{font-size:13px;font-weight:700;color:var(--negro)}
.hn{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.hf{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px}
.sft{display:flex;gap:9px;padding:11px 20px 15px;border-top:1px solid var(--borde)}
.bwsp{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#25d366;color:#fff;border:none;border-radius:11px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.breg{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--negro);color:#fff;border:none;border-radius:11px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--tab) + 12px);left:13px;right:13px;background:var(--negro);color:#fff;padding:12px 15px;border-radius:12px;font-size:13px;font-weight:500;z-index:400;display:none;box-shadow:0 8px 32px rgba(0,0,0,.25);line-height:1.4}
.toast.on{display:block;animation:slideUp .3s ease}
.toast strong{color:#facc15}

/* CHIP ESTADO */
.chip-r{background:#fef2f2;color:var(--rojo);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.chip-v{background:#f0fdf4;color:var(--verde);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.chip-a{background:#fffbeb;color:var(--am);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}

/* DIVIDER */
.div-line{height:1px;background:var(--borde);margin:12px 0}

/* BANNER FLOTANTE CTA */
.cta-float{
  position:fixed;bottom:calc(var(--tab) + 12px);left:13px;right:13px;
  background:var(--negro);border-radius:14px;
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  z-index:80;
  transform:translateY(120%);
  transition:transform .4s cubic-bezier(.34,1.2,.64,1);
}
.cta-float.visible{transform:translateY(0)}
.cta-float-txt{flex:1}
.cta-float-titulo{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
.cta-float-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.cta-float-btn{background:#25d366;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.cta-float-cerrar{font-size:16px;color:rgba(255,255,255,.3);cursor:pointer;flex-shrink:0;background:none;border:none;padding:0;line-height:1}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.vista{animation:slideUp .25s ease}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--borde);border-radius:2px}
</style>
</head>

// ════════════════════════════════
function rPipeline(){
  return`
<div class="esc" id="esc">
${ET.map(et=>`<div class="echip ${et.id===etapaA?'activo':''}" onclick="chEtapa('${et.id}')"><span class="ecdot" style="background:${et.c}"></span>${et.n} (${PR.filter(p=>p.e===et.id).length})</div>`).join('')}
</div>
<div id="pcards">${pCards(etapaA)}</div>`;
}

function pCards(eid){
  const cols=PR.filter(p=>p.e===eid);
  if(!cols.length) return`<div style="text-align:center;padding:40px 16px;color:var(--muted)">Sin prospectos en esta etapa</div>`;
  return cols.map(p=>{
    const v=VE.find(x=>x.id===p.v);
    return`<div class="pcf" onclick="openSheet(${p.id})">
${p.st==='vencida'?`<div class="pcf-stripe" style="background:var(--rojo)"></div>`:''}
${p.st==='hoy'?`<div class="pcf-stripe" style="background:var(--am)"></div>`:''}
<div class="pcf-top"><div><div class="pcf-n">${p.n}</div><div class="pcf-c">${p.ct}</div></div><div class="pcf-val">${p.valf}</div></div>
<div class="pcf-foot"><span class="pcf-vt">${v?.ini} · ${v?.n.split(' ')[0]}</span><span class="pcf-fecha" style="color:${p.st==='vencida'?'var(--rojo)':p.st==='hoy'?'var(--am)':'var(--muted)'}">${p.f}</span></div>
</div>`;
  }).join('');
}

function chEtapa(id){
  etapaA=id;
  document.querySelectorAll('.echip').forEach(c=>{
    const et=ET.find(e=>e.id===id);
    c.classList.toggle('activo',c.textContent.trim().startsWith(et.n));
  });
  document.getElementById('pcards').innerHTML=pCards(id);
}

function openSheet(id){

  const et=ET.find(x=>x.id===p.e);
  const hist=HIST[id]||[{i:'📞',a:'Llamada de seguimiento',n:'Confirmó interés. Solicita propuesta.',f:'Ayer'},{i:'➕',a:'Prospecto creado',n:'Ingresado por '+v?.n,f:'Hace 5 días'}];
  document.getElementById('sheet').innerHTML=`
<div class="shandle"></div>
<div class="shd">
  <div class="shn">${p.n}</div>
  <div class="shc">${p.ct} · ${v?.n}</div>
  <div class="setb" style="background:${et?.c}18;color:${et?.c}"><span style="width:8px;height:8px;border-radius:50%;background:${et?.c};display:inline-block"></span>${et?.n}</div>
</div>
<div class="sbd">
  <div class="ichips">
    <div class="ic"><div class="icl">Valor</div><div class="icv" style="color:var(--verde)">${p.valf}</div></div>
    <div class="ic"><div class="icl">Seguimiento</div><div class="icv" style="color:${p.st==='vencida'?'var(--rojo)':p.st==='hoy'?'var(--am)':'var(--negro)'}">${p.f}</div></div>
    <div class="ic"><div class="icl">Producto</div><div class="icv" style="font-size:12px;font-weight:600">${p.prod}</div></div>
    <div class="ic"><div class="icl">Vendedor</div><div class="icv" style="font-size:12px">${v?.n}</div></div>
    <div class="ic icf"><div class="icl">Última nota</div><div class="icv">${p.nota}</div></div>
  </div>
  <div class="ht">Historial</div>
  ${hist.map(h=>`<div class="hi"><div class="hico">${h.i}</div><div class="hcon"><div class="ha">${h.a}</div><div class="hn">${h.n}</div><div class="hf">${h.f}</div></div></div>`).join('')}
</div>
<div class="sft">
  <button class="bwsp" onclick="showToast('En la app real, abre WhatsApp con el contacto directamente.')">💬 WhatsApp</button>
  <button class="breg" onclick="showToast('Registras llamada, visita o nota, y programas el próximo seguimiento.')">+ Registrar</button>
</div>`;
  document.getElementById('sbg').classList.add('open');

}

function closeSheet(e){
  if(e.target===document.getElementById('sbg'))
    document.getElementById('sbg').classList.remove('open');
}

// ════════════════════════════════
// TOAST
// ════════════════════════════════
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=`<strong>💡</strong> ${msg}`;
  t.classList.add('on');
  clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('on'),4500);
}
